# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via Aleksandr Hovhannisyan, aleksandrhovhannisyan@gmail.com, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via .
title: Amir Rakhimov's homepage
email: amir.rakhimov.b@gmail.com
description: Bookmark this to keep an eye on my project updates!
baseurl: ""
url: ""
github-username: amir-rakhimov

# Build settings
markdown: kramdown
theme: null # replace minima with null
plugins:
  - jekyll-feed


# Default layouts 
defaults:
  -
    scope:
      type: posts
      path: _posts
    values:
      is_post: true
      layout: post
  -
    scope:
      type: pages
      path: _pages
    values:
      is_post: false
      layout: default

# Jekyll should recognise _pages folder
include: [_pages]
